<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrowserRPG - Retro Nation Builder</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: #1a1a2e;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }
    #game-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #loading {
      position: absolute;
      color: #eee;
      font-size: 24px;
      text-align: center;
    }
    #loading-spinner {
      font-size: 48px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="loading">
      <div id="loading-spinner">⚔️</div>
      <div>Loading BrowserRPG...</div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
